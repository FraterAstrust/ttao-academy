<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Inner Academy — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div class="bg-geometry" aria-hidden="true">
    <svg class="geo-svg" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
        <circle cx="300" cy="300" r="260" fill="none" stroke="rgba(212,175,55,0.05)" stroke-width="1"/>
        <circle cx="300" cy="300" r="190" fill="none" stroke="rgba(212,175,55,0.04)" stroke-width="1"/>
        <circle cx="300" cy="300" r="120" fill="none" stroke="rgba(212,175,55,0.03)" stroke-width="1"/>
        <polygon points="300,60 540,450 60,450"  fill="none" stroke="rgba(212,175,55,0.06)" stroke-width="1"/>
        <polygon points="300,540 60,150 540,150" fill="none" stroke="rgba(0,209,255,0.03)"  stroke-width="1"/>
    </svg>
</div>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-emblem" aria-hidden="true">
            <svg width="36" height="36" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                <circle cx="32" cy="32" r="30" fill="none" stroke="rgba(212,175,55,0.5)" stroke-width="0.8"/>
                <polygon points="32,8 56,48 8,48"   fill="none" stroke="rgba(212,175,55,0.6)"  stroke-width="0.8"/>
                <polygon points="32,56 8,16 56,16"  fill="none" stroke="rgba(0,209,255,0.35)" stroke-width="0.8"/>
                <circle cx="32" cy="32" r="3" fill="rgba(212,175,55,0.5)"/>
            </svg>
        </div>
        <div class="sidebar-title">TTAO</div>
    </div>
    <div class="sidebar-tier" id="sidebar-tier"></div>
    <ul class="sidebar-nav" id="sidebar-nav"></ul>
    <div class="sidebar-footer">
        <button class="logout-btn" id="logout-btn">⬡ Sign Out</button>
    </div>
</nav>

<div class="main-wrap">
    <header class="dash-header">
        <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">☰</button>
        <div class="dash-header-title">The Inner Academy</div>
        <div class="dash-user" id="dash-user"></div>
    </header>
    <main class="dash-content" id="dash-content">
        <div class="panel"><div class="loading">Entering the sanctum…</div></div>
    </main>
</div>

    crossorigin="anonymous"></script>
<script src="/js/dashboard.js"></script>

</body>
</html>
