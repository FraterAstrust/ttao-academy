<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTAO — Sysadmin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<body>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<nav class="sidebar" id="sidebar">

                <circle cx="32" cy="32" r="30" fill="none" stroke="rgba(212,175,55,0.5)" stroke-width="0.8"/>
                <polygon points="32,8 56,48 8,48"   fill="none" stroke="rgba(212,175,55,0.6)"  stroke-width="0.8"/>
                <polygon points="32,56 8,16 56,16"  fill="none" stroke="rgba(0,209,255,0.35)" stroke-width="0.8"/>
                <circle cx="32" cy="32" r="3" fill="rgba(212,175,55,0.5)"/>
            </svg>
        </div>
        <div>
            <div class="sidebar-title">TTAO</div>
            <div class="sidebar-role">Sysadmin</div>
        </div>
    </div>

    <ul class="sidebar-nav">
        <li><button class="nav-item active" data-panel="articles">
            <span class="nav-icon">📜</span><span>Articles</span>
        </button></li>
        <li><button class="nav-item" data-panel="lessons">

        <li><button class="nav-item" data-panel="labs">
            <span class="nav-icon">🧪</span><span>Lab Guides</span>

        <li><button class="nav-item" data-panel="students">
            <span class="nav-icon">👤</span><span>Students</span>
        </button></li>
        <li><button class="nav-item" data-panel="comments">
            <span class="nav-icon">💬</span><span>Comments</span>
        </button></li>
        <li><button class="nav-item" data-panel="preview">
            <span class="nav-icon">👁</span><span>Preview</span>
        </button></li>
        <li><button class="nav-item" data-panel="backup">
            <span class="nav-icon">💾</span><span>Backup</span>
        </button></li>
    </ul>

    <div class="sidebar-footer">
        <button class="logout-btn" id="logout-btn">⬡ Sign Out</button>
    </div>
</nav>

<div class="main-wrap">
    <header class="dash-header">
        <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">☰</button>
        <div class="dash-header-title">Inner Academy — Administration</div>
        <div class="dash-admin-badge">ASTRUST</div>
    </header>
    <main class="dash-content" id="dash-content">
        <div class="panel"><div class="loading">Verifying credentials…</div></div>
    </main>
</div>

<script
    src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"

    crossorigin="anonymous"></script>
<script src="/js/admin.js"></script>
